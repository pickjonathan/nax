name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate plugin & marketplace manifests
        run: |
          python -m json.tool .claude-plugin/marketplace.json > /dev/null
          python -m json.tool plugins/disciplined-entrepreneurship/.claude-plugin/plugin.json > /dev/null

      - name: Smoke-test helper scripts
        run: |
          S=plugins/disciplined-entrepreneurship/scripts
          python3 "$S/tam.py" --users 1500 --revenue 9000 > /dev/null
          python3 "$S/unit_economics.py" --monthly 20 --gross-margin 0.9 \
            --retention 0.8 --cost-of-capital 0.5 --coca 60 > /dev/null

      - name: Install into each assistant target (and assert no token leakage)
        run: |
          for ai in claude cursor codex; do
            dst="$RUNNER_TEMP/$ai"
            python3 -m nax_cli init "$dst" --ai "$ai" --force --yes
            if grep -rq 'CLAUDE_PLUGIN_ROOT' "$dst"; then
              echo "::error::\${CLAUDE_PLUGIN_ROOT} leaked into the $ai install"; exit 1
            fi
          done

      - name: Scaffold a venture and run the lifecycle engine
        run: |
          dst="$RUNNER_TEMP/claude"
          ( cd "$dst" && bash .claude/de/scripts/new_venture.sh "CI Test" )
          python3 "$dst/.claude/de/scripts/status.py" "$dst/ventures/ci-test" --next

      - name: Build wheel & confirm the component payload is bundled
        run: |
          python -m pip install --quiet build
          python -m build --wheel
          unzip -l dist/*.whl | grep -q "nax_cli/payload/commands/" \
            || { echo "::error::component payload not bundled into the wheel"; exit 1; }
